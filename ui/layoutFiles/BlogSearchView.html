<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Blog Search View</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" data-delete>
    </head>
    <body>
        <section data-layout="Blog Search View">
            <h1>{{blogName}} Search</h1>
            {{#hasSearchResults}}
                <h4 class="aoBlogEntryCopy">{{{subcaption}}}</h4>
                {{#hasResults}}
                    <div class="aoBlogSearchResultsCon">
                        {{{searchResultsHtml}}}
                    </div>
                {{/hasResults}}
                {{^hasResults}}
                    <br><div class="aoBlogProblem">{{noResultsMessage}}</div>
                {{/hasResults}}
            {{/hasSearchResults}}
            <div class="aoBlogSearchFormCon">
                <table width="100%" border="0" cellspacing="0" cellpadding="5" class="aoBlogSearchTable">
                    <tr>
                        <td class="aoBlogTableRowCellLeft" align="right">Keyword(s):</td>
                        <td class="aoBlogTableRowCellRight">
                            <input type="text" name="keywordlist" value="{{keywordListValue}}" maxlength="30" style="width:30ch;max-width:100%;">
                        </td>
                    </tr>
                    <tr>
                        <td class="aoBlogTableRowCellLeft" align="right"></td>
                        <td class="aoBlogTableRowCellRight">
                            <input type="submit" name="button" value=" Search Blogs ">
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" width="100%">
                            <div class="aoBlogFooterLink"><a href="{{backToRecentLink}}">&#171; Back to Recent Articles</a></div>
                        </td>
                    </tr>
                </table>
            </div>
            <input type="hidden" name="SourceFormID" value="{{sourceFormIdValue}}">
            <input type="hidden" name="FormID" value="{{formIdValue}}">
        </section>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" data-delete></script>
    </body>
</html>
