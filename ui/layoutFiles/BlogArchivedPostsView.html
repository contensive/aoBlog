<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Blog Archived Posts View</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" data-delete>
        <link href="blogs/blogs.css" rel="stylesheet" type="text/css" data-delete>
    </head>
    <body>
        <section data-layout="Blog Archived Posts View">
            <h1>{{{title}}}</h1>
            {{#hasPosts}}
                {{{postCellsHtml}}}
            {{/hasPosts}}
            {{^hasPosts}}
                <div class="aoBlogProblem">{{noPostsMessage}}</div>
            {{/hasPosts}}
            <div>&nbsp;</div>
            <div class="aoBlogFooterLink"><a href="{{backToRecentLink}}">&#171; Back to Recent Articles</a></div>
            <input type="hidden" name="SourceFormID" value="{{sourceFormIdValue}}">
        </section>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" data-delete></script>
    </body>
</html>
