<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog Article View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" data-delete>
  </head>
  <body>
    <section data-layout="Blog Article View">

        <input type="hidden" name="FormKey" value="{{formKey}}">

        <div class="aoBlogHeaderLink"><a href="{{backToRecentLink}}">&#171; Back to Recent Articles</a></div>

        {{#articleNotFound}}
        <div class="aoBlogProblem">{{articleNotFoundMessage}}</div>
        {{/articleNotFound}}

        {{^articleNotFound}}
        {{{postCellHtml}}}

        {{#hasApplyButton}}
        <div class="aoBlogCommentCopy">{{{applyButtonHtml}}}</div>
        {{/hasApplyButton}}

        {{{commentFormHtml}}}

        {{{hiddenFieldsHtml}}}
        {{/articleNotFound}}

    </section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" data-delete></script>
</body>
</html>
